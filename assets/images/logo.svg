      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      .logo-text { font-family: 'Outfit', sans-serif; font-size: 58px; font-weight: 800; fill: #2e5a7e; letter-spacing: 1px; }
    </style>
  </defs>

  <g transform="translate(10, 5)">
