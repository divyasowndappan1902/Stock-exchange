<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <!-- Preloader -->
    <div id="preloader">
        <img src="assets/images/logo.webp" alt="Loading Stackly..." class="preloader-logo">
    </div>


    <!-- Unique Login Layout -->
    <div class="login-layout">
        
        <!-- Left Side: Interactive Graphics -->
        <div class="login-graphics">
            <div style="position: relative; z-index: 10; text-align: center;">
                <img src="assets/images/logo.webp" alt="Stackly Logo" style="height: 80px; margin-bottom: 20px;">
                <p style="font-size: 20px; color: rgba(255,255,255,0.8); max-width: 400px;">Join Stackly today and unlock the power of institutional-grade trading tools.</p>
            </div>
            
            <!-- Abstract Chart Graphic -->
            <svg style="position: absolute; bottom: 0; left: 0; width: 100%; height: 300px; opacity: 0.3;" viewBox="0 0 1000 300" preserveAspectRatio="none">
                <path d="M0,300 L0,150 Q100,100 200,180 T400,140 T600,200 T800,100 T1000,50 L1000,300 Z" fill="var(--accent-color)"></path>
            </svg>
        </div>

        <!-- Right Side: Login Form -->
        <div class="login-form-container">
            <div class="login-box" data-aos="fade-up">
                <h2>Create Account</h2>
                <p>Please fill in the details below to sign up.</p>
                
                <div class="social-login">
                    <a href="#" class="social-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google
                    </a>
                    <a href="#" class="social-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/></svg>
                        Facebook
                    </a>
                </div>
                
                <div class="divider">or continue with email</div>
                
                <form id="signup-form">
                    <!-- Premium Role Selector -->
                    <div class="role-selector-wrapper">
                        <div class="role-selector">
                            <input type="radio" id="role-admin" name="user_role" value="admin" checked>
                            <input type="radio" id="role-customer" name="user_role" value="customer">
                            
                            <label for="role-admin" class="role-label">Admin</label>
                            <label for="role-customer" class="role-label">Customer</label>
                            
                            <div class="role-slider"></div>
                        </div>
                    </div>
                    <div id="error-msg" style="display: none; background: rgba(248, 113, 113, 0.1); color: #f87171; padding: 12px; border-radius: 8px; border: 1px solid rgba(248, 113, 113, 0.2); text-align: center; margin-bottom: 20px; font-size: 14px;">
                        Invalid input. Please try again.
                    </div>
                    
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" class="form-control" placeholder="Email address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control" placeholder="Password" required>
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control" placeholder="Confirm Password" required>
                    </div>
                    
                    <button type="submit" class="cta-btn" style="width: 100%; justify-content: center; border: none; cursor: pointer;">Sign Up</button>
                    
                    <p style="text-align: center; margin-top: 30px; font-size: 14px;">
                        Already have an account? <a href="login.html" style="color: var(--accent-color); font-weight: 700; text-decoration: none;">Sign in</a>
                    </p>
                    <p style="text-align: center; margin-top: 15px; font-size: 14px;">
                        <a href="index.html" style="color: var(--text-muted); text-decoration: none; border-bottom: 1px dashed var(--text-muted);">&larr; Back to Home</a>
                    </p>
                </form>
            </div>
        </div>

    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.querySelector('input[type="email"]').value;
            const passwords = document.querySelectorAll('input[type="password"]');
            const password = passwords[0].value;
            const confirmPassword = passwords[1].value;
            const errorMsg = document.getElementById('error-msg');
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!emailRegex.test(email) || password.length < 8) {
                errorMsg.innerText = 'Please enter a valid email and a password of at least 8 characters.';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.innerText = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }
            
            errorMsg.style.display = 'none';
            // Redirect to login page after successful"signup"
            window.location.href = 'login.html';
        });
    </script>
    <script src="dummy-handler.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>

<script>
    window.addEventListener('load', function() {
        document.body.classList.add('loaded');
    });
</script>
</body>
</html>
